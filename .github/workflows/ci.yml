name: CI

on:
  push:
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Git tag to build and attach release assets for'
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref && github.ref || github.run_id }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.ref }}

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: ${{ hashFiles('package-lock.json') != '' && 'npm' || '' }}

      - name: Install dependencies
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

      - name: Build (Chrome + Firefox)
        run: npm run build

      - name: Test — src (Vitest unit)
        run: npm run test:src

      - name: Test — chrome-dist (Vitest chrome)
        run: npm run test:chrome

      - name: Test — firefox-dist (Vitest firefox)
        run: npm run test:firefox

      - name: Test — lint (web-ext lint)
        run: npm run test:lint

      - name: Package Chrome extension
        if: success()
        run: cd dist/chrome && zip -r ../../patent-cite-chrome.zip .

      - name: Package Firefox extension
        if: success()
        run: cd dist/firefox && zip -r ../../patent-cite-firefox.zip .

      - name: Upload Chrome artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: patent-cite-chrome
          path: patent-cite-chrome.zip
          retention-days: 30

      - name: Upload Firefox artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: patent-cite-firefox
          path: patent-cite-firefox.zip
          retention-days: 30

      - name: Attach assets to GitHub release
        if: success() && inputs.tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ inputs.tag }}" \
            patent-cite-chrome.zip \
            patent-cite-firefox.zip \
            --clobber
