# .github/workflows/e2e-nightly.yml
#
# Phase 29 (CRON-01, CRON-03) — Nightly E2E cron + auto-issue filing.
#
# Schedule: 06:00 UTC daily. Manual trigger via workflow_dispatch.
# Sunday runs the full live suite (66 cases); Mon-Sat run a deterministic
# 30-case rotating sample (see scripts/select-cron-cases.mjs).
# Smoke pre-flight on the seed patent gates the suite — on DOM drift, a
# single meta-issue is filed and the regression is skipped (no 76-issue storm).
# Per-case failures (non-FLAKE) are filed via scripts/e2e-report-issue.mjs
# with fingerprint-based dedup.
#
# The workflow ALWAYS exits success after issue filing — the filed issue is
# the failure signal, not a red X on the workflow run page.

name: E2E Nightly

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:
    inputs:
      force_full_suite:
        description: 'Run all 66 live cases (override day-of-week rotation)'
        type: boolean
        default: false
      llm_run_id:
        description: 'Ingest workflow run_id containing llm-report artifact (Phase 32)'
        type: string
        required: false
        default: ''
        # An explicit empty-string default (single-quoted) is mandatory per
        # Phase 32 Pitfall 3 — null-or-omitted defaults break the gating
        # expression below under cron-triggered runs.

# Static concurrency group prevents schedule + workflow_dispatch from racing
# (per 29-RESEARCH.md Risk 1 — overrides CONTEXT.md dynamic expression).
# cancel-in-progress: false so a running cron is never killed by a new trigger.
concurrency:
  group: e2e-nightly
  cancel-in-progress: false

permissions:
  contents: read
  issues: write

jobs:
  e2e-nightly:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      PLAYWRIGHT_RUN_ID: ${{ github.run_id }}
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      GITHUB_REPOSITORY: ${{ github.repository }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: ${{ hashFiles('package-lock.json') != '' && 'npm' || '' }}

      - name: Install dependencies
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

      - name: Cache Playwright Chromium
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: pw-${{ runner.os }}-${{ hashFiles('package.json') }}

      - name: Install Playwright Chromium
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install chromium
        # No --with-deps: CONTEXT.md decision; ubuntu-latest has Chromium system
        # deps preinstalled. See 29-RESEARCH.md Pitfall 3.

      - name: Verify Playwright binary
        run: npx playwright --version
        # Pitfall 2 mitigation: ensures the cached binary is functional before
        # running any tests. A broken cache causes a clean failure here, not a
        # silent bad-cache scenario (29-RESEARCH.md Pitfall 2).

      - name: Build Chrome extension
        run: npm run build:chrome

      - name: Run Phase 29 unit tests (sanity gate)
        run: npx vitest run tests/unit/select-cron-cases.test.js tests/unit/e2e-report-issue.test.js

      - name: Ensure e2e-nightly label exists
        run: |
          gh label create "e2e-nightly" \
            --color "0075ca" \
            --description "Auto-filed by nightly E2E cron" \
            --force 2>/dev/null || true
        # --force updates if exists; || true makes the step safe if gh rejects --force.
        # Color uses 6-char hex WITHOUT # prefix (gh CLI requirement).
        # See 29-RESEARCH.md Risk 6.

      - name: Download and validate LLM report (if llm_run_id provided)
        if: inputs.llm_run_id != ''
        env:
          # CR-02 (Phase 32 review): env-var hop prevents GitHub Actions
          # script injection (CWE-94). The previous `gh run download
          # ${{ inputs.llm_run_id }}` interpolation let a workflow-dispatch
          # caller execute arbitrary commands on the runner under the
          # nightly's `issues: write` token. Numeric guard below enforces
          # the value is a pure decimal run-id before passing to gh.
          LLM_RUN_ID: ${{ inputs.llm_run_id }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          case "$LLM_RUN_ID" in
            ''|*[!0-9]*)
              echo "invalid llm_run_id (must be all decimal digits): $LLM_RUN_ID" >&2
              exit 1
              ;;
          esac
          mkdir -p tests/e2e/artifacts/${{ github.run_id }}
          gh run download "$LLM_RUN_ID" -n llm-report -D tests/e2e/artifacts/${{ github.run_id }}
          node -e "
            import('./tests/e2e/lib/llm-report.js').then(({ appendLlmIteration }) => {
              const fs = require('node:fs');
              const r = JSON.parse(fs.readFileSync('tests/e2e/artifacts/${{ github.run_id }}/llm-report.json', 'utf8'));
              const tmp = require('node:os').tmpdir() + '/uat-validate.json';
              fs.writeFileSync(tmp, JSON.stringify({
                run_id: r.run_id, started_iso: r.started_iso, finished_iso: r.finished_iso,
                iterations_total: 0, summary: r.summary, iterations: []
              }));
              for (const it of r.iterations) appendLlmIteration(tmp, it);
              console.log('schema OK: ' + r.iterations.length + ' iterations');
            });
          "
        # Phase 32 Plan 32-04 (UAT-03) — gated download + schema-validate step.
        # Placed AFTER the label step and BEFORE pre-flight smoke so malformed
        # artifacts fail fast, before consuming smoke / regression budget.
        # Schema validity is a hard gate per D-03/D-06 — appendLlmIteration
        # throws on missing required fields, which fails the workflow. This
        # step intentionally omits the error-tolerance escape valve used by
        # the smoke / regression / fault-injection steps below.
        # Gating uses an explicit empty-string comparison per Pitfall 3.
        # Downloaded under tests/e2e/artifacts/${{ github.run_id }}/ so
        # run-triage-pipeline.mjs's --llm-report satisfies the WR-05
        # ALLOWED_INPUT_ROOTS bound (Phase 36 Open-Item-1). github.run_id
        # is GitHub-controlled (numeric) — safe to interpolate in the path;
        # the user-controlled LLM_RUN_ID value stays behind the env hop +
        # numeric guard and is NOT used in the artifact path.

      - name: Pre-flight smoke (1 case)
        id: smoke
        continue-on-error: true
        run: |
          npx playwright test \
            --config tests/e2e/playwright.config.js \
            --grep "US11427642-spec-short-1" \
            specs/regression.spec.js
        # 1-case probe on the seed patent. If this fails (DOM_DRIFT / CAPTCHA),
        # we file ONE meta-issue and skip the full suite (no 76-issue storm).
        # Pattern 4 in 29-RESEARCH.md.

      - name: File meta-issue on smoke failure
        if: steps.smoke.outcome == 'failure'
        run: node scripts/e2e-report-issue.mjs --meta-drift

      - name: Select test cases for today
        id: cases
        if: steps.smoke.outcome == 'success'
        env:
          # CR-02 (Phase 32 review): env-var hop. `force_full_suite` is declared
          # as `type: boolean`, so GH normally coerces it to a literal 'true'/
          # 'false' string — but routing through env keeps the value out of
          # the shell parser regardless of any future schema drift (defense
          # in depth against CWE-94).
          FORCE_FULL_SUITE: ${{ inputs.force_full_suite }}
        run: |
          if [ "$FORCE_FULL_SUITE" = "true" ]; then
            CASES=$(node scripts/select-cron-cases.mjs --full)
          else
            CASES=$(node scripts/select-cron-cases.mjs)
          fi
          # Pipe-OR'd ID list is passed as --grep regex; Playwright treats | as regex OR.
          echo "cases=$CASES" >> "$GITHUB_OUTPUT"
          echo "Selected $(echo "$CASES" | tr '|' '\n' | wc -l) cases for this run"
        # inputs.force_full_suite is null for cron-triggered runs (not 'false') —
        # the string comparison '= "true"' is safe: null != "true", so cron runs
        # the default rotation. See 29-RESEARCH.md Pitfall 1.

      - name: Run E2E regression
        id: regression
        if: steps.smoke.outcome == 'success'
        continue-on-error: true
        run: |
          npx playwright test \
            --config tests/e2e/playwright.config.js \
            --grep "${{ steps.cases.outputs.cases }}" \
            specs/regression.spec.js
        # continue-on-error: true so the workflow proceeds to file issues then
        # exits success. The filed issue IS the signal; a red-X workflow run is
        # not. See 29-CONTEXT.md Specific Ideas.

      - name: File issues for failures
        if: steps.smoke.outcome == 'success' && steps.regression.outcome == 'failure'
        run: node scripts/e2e-report-issue.mjs
        # Only runs when regression produced failures. Reads
        # tests/e2e/artifacts/${PLAYWRIGHT_RUN_ID}/report.json and files
        # per-case issues with fingerprint-based dedup (CRON-04, CRON-05).

      - name: Run fault-injection spec
        id: fault_injection
        if: steps.smoke.outcome == 'success'
        continue-on-error: true
        run: |
          npx playwright test \
            --config tests/e2e/playwright.config.js \
            specs/fault-injection.spec.js
        # Phase 30 (INJ-02) — runs every nightly tick (NOT weekday-rotated;
        # single-case smoke probe for the Worker/USPTO fallback path).
        # No --grep — the spec file contains exactly one test.
        # continue-on-error: true so the workflow proceeds to file an issue
        # and upload artifacts. WORKER_FALLBACK_FAILED is logged into the
        # same report.json that the regression step writes to (Phase 28's
        # report.js appendCase is idempotent + per-id).
        # retries: 0 inside the spec via test.describe.configure — overrides
        # playwright.config.js retries:1; not FLAKE-eligible.

      - name: File issues for fault-injection failure
        if: steps.smoke.outcome == 'success' && steps.fault_injection.outcome == 'failure'
        run: node scripts/e2e-report-issue.mjs
        # Phase 30 (INJ-02) — reuses Phase 29's fingerprint-dedup reporter.
        # report.json now contains a WORKER_FALLBACK_FAILED entry; the
        # reporter's existing per-case logic handles it the same way as
        # WRONG_CITATION / NO_CITATION_PRODUCED. Issue title prefix becomes
        # "[e2e-nightly] US11427642-spec-short-1: WORKER_FALLBACK_FAILED".

      # TIMEOUT BUDGET (Phase 36 / ORCH-03 / D-14)
      # Job cap: timeout-minutes: 30 (see line 50 above).
      # Existing budget consumed:
      #   - smoke + select + regression: ~N_daily × 90s/case (up to 66 cases on Sunday)
      #   - fault-injection spec: ~90s (single case, retries: 0)
      # Quarantine addition:
      #   N_quarantine × ~90s/case (per-test timeout in playwright.config.js)
      #   + ~60s build (npm run build:chrome is baked into e2e:quarantine)
      # CURRENT N_quarantine = 0 (empty corpus) → 0 added minutes; full headroom.
      # CEILING: at ~20 quarantine cases, 20×90s = 30 min would exhaust the job cap.
      # Mitigation: the quarantine spec step has its own timeout-minutes: 15 (below)
      # so it cannot starve the job regardless of corpus growth.
      # >20 cases → daily --grep rotation (deferred, D-14). Flag when corpus grows.

      - name: Ensure e2e-quarantine label exists
        if: inputs.llm_run_id != ''
        run: |
          gh label create "e2e-quarantine" \
            --color "d93f0b" \
            --description "Auto-filed by nightly quarantine suite" \
            --force 2>/dev/null || true
        # Mirrors the e2e-nightly label step (line 97) with a distinct color (d93f0b).
        # Color uses 6-char hex WITHOUT # prefix (gh CLI requirement).
        # --force updates if exists; || true makes the step safe if gh rejects --force.
        # Gated on llm_run_id per D-13 — only bootstrapped when the quarantine path runs.
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Run triage pipeline
        if: inputs.llm_run_id != ''
        run: node scripts/run-triage-pipeline.mjs --llm-report tests/e2e/artifacts/${{ github.run_id }}/llm-report.json
        # Chains: rerun-validator → triage-classifier → issue-file (--source triage) → quarantine-append.
        # Exits 0 always (D-06 / nightly cron philosophy); stage failures are logged, never abort the chain.
        # The triage-classifier LLM second-pass hits the CI=true gate → returns {ciGate:true} for
        # ambiguous findings (D-08); heuristic-resolved findings still flow to issue-file + quarantine-append.
        # Path tests/e2e/artifacts/${{ github.run_id }}/llm-report.json satisfies WR-05
        # ALLOWED_INPUT_ROOTS bound (artifacts/ or fixtures/ — set by relocate in Task 1).
        # DO NOT add env: CI: '' — that defeats the triage-classifier CI gate (Pitfall 3).

      - name: Run quarantine spec (non-gating)
        id: quarantine
        if: inputs.llm_run_id != ''
        continue-on-error: true
        timeout-minutes: 15
        run: npm run e2e:quarantine
        # continue-on-error mirrors the regression step (line 191) — a quarantine failure
        # NEVER fails the job (QUAR-04). The filed issue is the signal, not a red-X.
        # timeout-minutes: 15 (D-14 / Discretion A3) so quarantine cannot consume the
        # whole 30-min job budget; see TIMEOUT BUDGET comment above.
        # --retries=0 --pass-with-no-tests are baked into the e2e:quarantine npm script
        # (Plan 36-01 / D-03); empty corpus exits 0 with 0 tests.

      - name: File quarantine issues on failure
        if: inputs.llm_run_id != '' && steps.quarantine.outcome == 'failure'
        run: node scripts/e2e-report-issue.mjs --source quarantine
        # Gated on quarantine step outcome == 'failure' — mirrors the regression filer
        # (line 202). Reads tests/e2e/artifacts/${PLAYWRIGHT_RUN_ID}/report.json
        # (PLAYWRIGHT_RUN_ID = github.run_id, set job-wide at line 52) and files
        # per-case issues stamped with the e2e-quarantine label (Plan 36-03 / D-15).
        # Reuses fingerprint-based dedup; sanitizeCaseId guard from Phase 35 CR-01
        # applies to the quarantine source path (no shell injection surface).

      - name: Upload E2E artifacts
        id: upload-artifacts
        if: always() && (steps.smoke.outcome == 'failure' || steps.regression.outcome == 'failure' || steps.fault_injection.outcome == 'failure' || steps.quarantine.outcome == 'failure')
        uses: actions/upload-artifact@v4
        with:
          name: e2e-nightly-${{ github.run_id }}
          path: tests/e2e/artifacts/
          retention-days: 14
          if-no-files-found: warn
        # if-no-files-found: warn prevents the step from failing when the smoke
        # probe fails before any artifacts are written. See 29-RESEARCH.md Risk 5.
