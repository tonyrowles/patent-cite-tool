# .github/workflows/v40-verifier-gate.yml
#
# Phase 41 Plan 41-03 — Verifier-gate workflow for auto-fix/* PRs.
#
# Implements:
#   - VFY-GATE-01: PR-triggered on auto-fix/*, parses affected_cases from PR
#     body, runs each case 3x consecutively via verify-single-case.mjs, only
#     flips draft -> ready if every run is Tier A or Tier B.
#   - VFY-GATE-02: Full 76-case regression suite on PR branch (unpinned) in
#     a parallel job; any regression blocks the ready-flip.
#   - VFY-GATE-03: Diff-size cap (200 LOC src/, 50 LOC tests/) enforced in
#     diff-guard fail-fast job; oversized diffs label human-review-required
#     + post explanatory comment + exit non-zero (PR stays draft).
#   - VFY-GATE-04: Three-file verifier-pin to origin/main (pdf-verifier.js +
#     baseline.json + pdf-fetch.js) + diff-guard regex bank rejecting the 6
#     LOCKED forbidden paths + Layer 5 test-count invariant.
#
# Four-job structure (41-RESEARCH §Architecture Patterns diagram):
#   diff-guard (fail-fast)
#     -> verifier-gate + regression-suite (parallel, both needs: diff-guard)
#       -> ready-flip (needs: [verifier-gate, regression-suite])
#
# Phase 47 SLOT RESERVATION: the `verifier-gate:` job NAME is the slot Phase
# 39 reserved on the v4.0-main-protection ruleset (id 17086676). Phase 47
# CLEANUP-04 will bind this name to required_status_checks alongside Phase
# 40's `deps-update-gate`. Do NOT rename without coordinating Phase 47.
#
# Defenses paraphrased (Phase 40-03 scar — see 41-03 RED test header):
#   - skip-ci marker:                          not used (no self-commits)
#   - the gh pr merge auto-flag:               not used (humans merge)
#   - the action auto-merge input:             not used (humans merge)
#   - the Identity-token write permission:     intentionally absent
#   - the actions-write permission:            intentionally absent
#   - the pull-request-target trigger variant: intentionally avoided
#
# Permissions (Pitfall 1 step 7 minimization):
#   - contents: read            (checkout + git operations)
#   - pull-requests: write      (gh pr ready + gh pr comment + gh pr edit --add-label)
#   - issues: read              (gh issue view fallback if needed)
#   - repository-projects: read (gh pr edit --add-label dep per cli/cli #6274)

name: V40 Verifier Gate

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write
  issues: read
  repository-projects: read

# PR-scoped concurrency. Verifier is READ-ONLY w.r.t. the repo so cancellation
# is safe (contrast Phase 42 auto-fix workflow which will use cancel-in-progress: false).
concurrency:
  group: v40-verifier-gate-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:

  # ---------------------------------------------------------------------------
  # Job 1: diff-guard — fail-fast on size cap + path bank + test-count invariant
  # ---------------------------------------------------------------------------
  diff-guard:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      src_loc: ${{ steps.diff_size.outputs.src_loc }}
      tests_loc: ${{ steps.diff_size.outputs.tests_loc }}
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      PR_NUM: ${{ github.event.pull_request.number }}

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0   # needed for origin/main pin (Pitfall B)

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: ${{ hashFiles('package-lock.json') != '' && 'npm' || '' }}

      - name: Install dependencies
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

      - name: Ensure human-review-required label exists
        # Idempotent label create (mirrors e2e-nightly.yml:97-102). The label
        # is added by the rejection step below. --force updates if exists;
        # || true makes the step safe if gh rejects --force. Color: gh CLI
        # requires 6-char hex without # prefix.
        run: |
          gh label create "human-review-required" \
            --color "d93f0b" \
            --description "Auto-fix PR requires human review (size cap, diff-guard, verifier, or regression rejection)" \
            --force 2>/dev/null || true

      - name: Diff-size cap (src/ <= 200 LOC, tests/ <= 50 LOC)
        id: diff_size
        # 41-RESEARCH Pattern 2. parse_shortstat is defensive: missing
        # insertions OR deletions lines are treated as zero. Renames count
        # as both ins+del (conservative — large renames trip the cap).
        run: |
          git fetch origin main --depth=1 || git fetch origin main
          parse_shortstat() {
            local p="$1"
            local out
            out=$(git diff --shortstat origin/main..HEAD -- "$p" 2>/dev/null || echo "")
            local ins del
            ins=$(echo "$out" | grep -oE '[0-9]+ insertion' | grep -oE '[0-9]+' || echo 0)
            del=$(echo "$out" | grep -oE '[0-9]+ deletion'  | grep -oE '[0-9]+' || echo 0)
            ins=${ins:-0}
            del=${del:-0}
            echo $((ins + del))
          }
          SRC_LOC=$(parse_shortstat "src/")
          TESTS_LOC=$(parse_shortstat "tests/")
          echo "src_loc=$SRC_LOC"     >> "$GITHUB_OUTPUT"
          echo "tests_loc=$TESTS_LOC" >> "$GITHUB_OUTPUT"
          echo "diff size: src/ = $SRC_LOC LOC; tests/ = $TESTS_LOC LOC"
          if [ "$SRC_LOC" -gt 200 ] || [ "$TESTS_LOC" -gt 50 ]; then
            echo "::error::Diff exceeds caps -- src/ $SRC_LOC > 200 OR tests/ $TESTS_LOC > 50"
            exit 1
          fi

      - name: Diff-guard regex bank (forbidden paths)
        # Pipes git diff --name-only into Plan 41-01's pure-function helper.
        # The helper exits 1 on any violation with violations printed to stderr.
        run: |
          git diff --name-only origin/main..HEAD | node scripts/check-diff-guard.mjs

      - name: Test-count invariant (TEST_CASES length never decreases)
        # Layer 5 defense (Pitfall 3 Defense 5) — defense-in-depth on top of
        # Layer 2 (diff-guard already forbids modifying tests/test-cases.js).
        # The path is forbidden so this should never trip, but a redundant
        # ~10-LOC check provides cheap defense-in-depth.
        run: |
          git show origin/main:tests/test-cases.js > /tmp/main-test-cases.js
          MAIN_LEN=$(node --input-type=module -e "
            const m = await import('/tmp/main-test-cases.js');
            console.log(m.TEST_CASES.length);
          ")
          PR_LEN=$(node --input-type=module -e "
            const m = await import('${{ github.workspace }}/tests/test-cases.js');
            console.log(m.TEST_CASES.length);
          ")
          echo "TEST_CASES.length: main=$MAIN_LEN, pr=$PR_LEN"
          if [ "$PR_LEN" -lt "$MAIN_LEN" ]; then
            echo "::error::TEST_CASES shrank from $MAIN_LEN to $PR_LEN (test-count invariant)"
            exit 1
          fi

      - name: Label + comment on rejection
        if: failure()
        # env-hop pattern (Phase 40-03 CR-02): never interpolate user-controlled
        # values directly into a run: block. PR_NUM/SRC_LOC/TESTS_LOC are all
        # workflow-trusted but the discipline generalizes.
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          SRC_LOC: ${{ steps.diff_size.outputs.src_loc }}
          TESTS_LOC: ${{ steps.diff_size.outputs.tests_loc }}
        run: |
          gh pr edit "$PR_NUMBER" --add-label "human-review-required" 2>&1 || true
          gh pr comment "$PR_NUMBER" --body "Verifier-gate diff-guard rejected this PR -- src/ = ${SRC_LOC:-?} LOC (limit 200); tests/ = ${TESTS_LOC:-?} LOC (limit 50); OR a forbidden path was touched OR the TEST_CASES array shrank. PR stays in draft for human review." 2>&1 || true

  # ---------------------------------------------------------------------------
  # Job 2: verifier-gate -- 3x consecutive verifyCitation runs on affected cases
  #
  # NAMED EXACTLY `verifier-gate` -- Phase 47 CLEANUP-04 required-status-check
  # slot. Do NOT rename without coordinating Phase 47.
  # ---------------------------------------------------------------------------
  verifier-gate:
    needs: diff-guard
    runs-on: ubuntu-latest
    timeout-minutes: 25
    # Phase 53 PARTIAL-02 (D-09): expose per-case PASS/FAIL outputs so the
    # ready-flip job can compute the >=4/5 partial-verified threshold. The
    # full-pass success contract is PRESERVED: FAILED_CASES empty -> existing
    # behavior unchanged; partial-pass triggers the new conditional label step.
    outputs:
      passing_cases:  ${{ steps.verify.outputs.passing_cases }}
      failing_cases:  ${{ steps.verify.outputs.failing_cases }}
      affected_count: ${{ steps.verify.outputs.affected_count }}
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      PR_NUM: ${{ github.event.pull_request.number }}

    steps:
      - name: Scope decision (auto-fix/* PRs only; fast-path SUCCESS otherwise)
        id: scope
        if: github.event_name == 'pull_request'
        run: |
          if [[ "${{ github.head_ref }}" == auto-fix/* ]]; then
            echo "active=true" >> "$GITHUB_OUTPUT"
          else
            echo "active=false" >> "$GITHUB_OUTPUT"
            echo "Fast-path SUCCESS — non-auto-fix PR (head=${{ github.head_ref }})"
          fi

      - uses: actions/checkout@v4
        if: steps.scope.outputs.active == 'true' || github.event_name != 'pull_request'
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0   # required for origin/main verifier-pin

      - uses: actions/setup-node@v4
        if: steps.scope.outputs.active == 'true' || github.event_name != 'pull_request'
        with:
          node-version: 22
          cache: ${{ hashFiles('package-lock.json') != '' && 'npm' || '' }}

      - name: Install dependencies
        if: steps.scope.outputs.active == 'true' || github.event_name != 'pull_request'
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

      - name: Cache Playwright Chromium
        id: playwright-cache
        if: steps.scope.outputs.active == 'true' || github.event_name != 'pull_request'
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: pw-${{ runner.os }}-${{ hashFiles('package.json') }}

      - name: Install Playwright Chromium
        if: (steps.scope.outputs.active == 'true' || github.event_name != 'pull_request') && (steps.playwright-cache.outputs.cache-hit != 'true')
        run: npx playwright install chromium

      - name: Verify Playwright binary
        if: steps.scope.outputs.active == 'true' || github.event_name != 'pull_request'
        run: npx playwright --version

      - name: Build Chrome extension
        if: steps.scope.outputs.active == 'true' || github.event_name != 'pull_request'
        run: npm run build:chrome

      - name: Pin verifier files to origin/main
        if: steps.scope.outputs.active == 'true' || github.event_name != 'pull_request'
        # VFY-GATE-04 Layer 4 — pin AFTER PR-branch checkout but BEFORE
        # verifyCitation invocation. THREE files (NOT four): golden-loader.js
        # does not exist per 41-RESEARCH §Pattern 4 Assumption A8.
        # Sanity check: if pin failed the diff would be non-zero.
        run: |
          git fetch origin main
          git checkout origin/main -- tests/e2e/lib/pdf-verifier.js
          git checkout origin/main -- tests/golden/baseline.json
          git checkout origin/main -- tests/e2e/lib/pdf-fetch.js
          for f in tests/e2e/lib/pdf-verifier.js tests/golden/baseline.json tests/e2e/lib/pdf-fetch.js; do
            if [ "$(git diff origin/main -- "$f" | wc -l)" != "0" ]; then
              echo "::error::verifier pin failed for $f"
              exit 1
            fi
          done

      - name: Verify affected cases 3x consecutively
        id: verify
        if: steps.scope.outputs.active == 'true' || github.event_name != 'pull_request'
        # 41-RESEARCH Pattern 5 verbatim. PR_BODY via env-hop (CWE-94 defense)
        # then piped via stdin to parse-affected-cases.mjs (regex-only parser).
        # Empty CASES is a HARD FAIL per Pitfall C (would otherwise silently
        # pass with zero verification runs).
        #
        # Phase 53 PARTIAL-02 (D-09..D-13): the hard-fail on any failing case
        # is RELAXED for the partial-pass branch. Three outcomes now:
        #   1. FAILED_CASES empty                              -> existing full-pass; no comment, no exit; ready-flip applies auto-fix:verified (D-10 UNCHANGED).
        #   2. partial-pass eligible (>=5 cases, >=80% pass,   -> log NOTICE; do NOT add human-review-required; do NOT exit 1.
        #      no FLAKE in failing cases)                         ready-flip computes + applies auto-fix:partial-verified.
        #   3. full-fail / below-threshold / FLAKE present     -> existing hard-fail path (human-review-required + comment + exit 1).
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          PR_BODY=$(gh pr view "$PR_NUMBER" --json body --jq '.body')
          CASES=$(printf '%s' "$PR_BODY" | node scripts/parse-affected-cases.mjs)
          if [ -z "$CASES" ]; then
            echo "::error::PR body missing or empty <!-- affected_cases: ... --> comment (Pitfall C)"
            gh pr comment "$PR_NUMBER" --body "Verifier-gate FAIL -- PR body missing the affected_cases HTML comment. Phase 43 auto-fix PRs must include <!-- affected_cases: id1,id2 -->. PR stays draft."
            exit 1
          fi

          mkdir -p playwright-report
          FAILED_CASES=""
          PASSING_CASES=""
          for case_id in $CASES; do
            echo "::group::Verify $case_id (3 consecutive runs)"
            ALL_PASS=true
            # Run all 3 unconditionally (Pitfall E -- do NOT abort on first fail;
            # workflow must surface complete signal across all 3 attempts).
            for i in 1 2 3; do
              REPORT="playwright-report/single-case-${case_id}-run-${i}.json"
              if ! node scripts/verify-single-case.mjs --case "$case_id" --output "$REPORT"; then
                echo "::warning::run $i FAILED for $case_id (Tier C or below, or argv error)"
                ALL_PASS=false
              else
                TIER=$(node -e "console.log(JSON.parse(require('fs').readFileSync('$REPORT','utf8')).runs.at(-1).tier_used)")
                echo "run $i tier=$TIER"
                if [ "$TIER" != "A" ] && [ "$TIER" != "B" ]; then
                  ALL_PASS=false
                fi
              fi
            done
            if [ "$ALL_PASS" != "true" ]; then
              FAILED_CASES="$FAILED_CASES $case_id"
            else
              PASSING_CASES="$PASSING_CASES $case_id"
            fi
            echo "::endgroup::"
          done

          # Compute outputs (Phase 53 PARTIAL-02 D-09): ready-flip consumes
          # these to evaluate the >=4/5 partial-verified threshold + FLAKE
          # masquerade check. Empty PASSING_CASES on full-fail; empty
          # FAILING_CASES on full-pass.
          AFFECTED_COUNT=$(echo "$CASES" | wc -w | xargs)
          PASSING_CSV=$(echo "$PASSING_CASES" | xargs | tr ' ' ',')
          FAILING_CSV=$(echo "$FAILED_CASES"  | xargs | tr ' ' ',')
          {
            echo "passing_cases=$PASSING_CSV"
            echo "failing_cases=$FAILING_CSV"
            echo "affected_count=$AFFECTED_COUNT"
          } >> "$GITHUB_OUTPUT"

          if [ -z "$FAILED_CASES" ]; then
            echo "Full-pass: all $AFFECTED_COUNT affected cases passed 3x Tier A/B"
            exit 0
          fi

          # Partial-pass eligibility check (D-09..D-13). FLAKE-masquerade
          # mitigation: any FLAKE in failing cases disqualifies the partial
          # path (1 flake cannot mask 4 real fails).
          FAIL_COUNT=$(echo "$FAILED_CASES" | wc -w | xargs)
          PASS_COUNT=$((AFFECTED_COUNT - FAIL_COUNT))
          FLAKE_PRESENT=0
          for case_id in $FAILED_CASES; do
            for report in playwright-report/single-case-${case_id}-run-*.json; do
              [ -f "$report" ] || continue
              if jq -e '.runs[]? | select(.errorClass == "FLAKE")' "$report" >/dev/null 2>&1; then
                FLAKE_PRESENT=1
                break 2
              fi
            done
          done

          # D-12: abstain for <5 cases (4/5 threshold meaningless on small sets).
          # D-11: PARTIAL_THRESHOLD = 0.80 = 4/5. awk-based ratio (no bc).
          PARTIAL_OK=0
          if [ "$AFFECTED_COUNT" -ge 5 ] && [ "$FLAKE_PRESENT" = "0" ]; then
            RATIO_OK=$(awk -v p="$PASS_COUNT" -v a="$AFFECTED_COUNT" 'BEGIN { print (a > 0 && p / a >= 0.80) ? 1 : 0 }')
            if [ "$RATIO_OK" = "1" ]; then
              PARTIAL_OK=1
            fi
          fi

          if [ "$PARTIAL_OK" = "1" ]; then
            echo "::notice::Partial-pass detected — ${PASS_COUNT}/${AFFECTED_COUNT} affected cases passed (>= 0.80; no FLAKE). Handing off to ready-flip for partial-label decision."
            echo "PASSING_CASES:$PASSING_CASES"
            echo "FAILING_CASES:$FAILED_CASES"
            exit 0
          fi

          # Full-fail OR below-threshold OR FLAKE present -> existing hard-fail.
          echo "::error::Cases failed 3x verification:$FAILED_CASES (FLAKE_PRESENT=$FLAKE_PRESENT, ratio ${PASS_COUNT}/${AFFECTED_COUNT})"
          gh pr edit "$PR_NUMBER" --add-label "human-review-required" 2>&1 || true
          gh pr comment "$PR_NUMBER" --body "Verifier-gate FAIL -- cases$FAILED_CASES did not pass 3 consecutive Tier A/B runs. PR stays draft for human review."
          exit 1

      - name: Upload per-case verifier reports
        if: (steps.scope.outputs.active == 'true' || github.event_name != 'pull_request') && always()
        uses: actions/upload-artifact@v4
        with:
          name: verifier-gate-reports-${{ github.run_id }}
          path: playwright-report/single-case-*.json
          if-no-files-found: ignore

  # ---------------------------------------------------------------------------
  # Job 3: regression-suite -- full 76-case Playwright regression
  #
  # Parallel with verifier-gate (both needs: diff-guard). Failure isolation:
  # if verifier-gate's affected-case runs pass but a regression appears
  # elsewhere, the workflow surfaces BOTH signals.
  # ---------------------------------------------------------------------------
  regression-suite:
    needs: diff-guard
    runs-on: ubuntu-latest
    timeout-minutes: 30   # matches e2e-nightly.yml
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      PR_NUM: ${{ github.event.pull_request.number }}

    steps:
      - name: Scope decision (auto-fix/* PRs only; fast-path SUCCESS otherwise)
        id: scope
        if: github.event_name == 'pull_request'
        run: |
          if [[ "${{ github.head_ref }}" == auto-fix/* ]]; then
            echo "active=true" >> "$GITHUB_OUTPUT"
          else
            echo "active=false" >> "$GITHUB_OUTPUT"
            echo "Fast-path SUCCESS — non-auto-fix PR (head=${{ github.head_ref }})"
          fi

      - uses: actions/checkout@v4
        if: steps.scope.outputs.active == 'true' || github.event_name != 'pull_request'
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - uses: actions/setup-node@v4
        if: steps.scope.outputs.active == 'true' || github.event_name != 'pull_request'
        with:
          node-version: 22
          cache: ${{ hashFiles('package-lock.json') != '' && 'npm' || '' }}

      - name: Install dependencies
        if: steps.scope.outputs.active == 'true' || github.event_name != 'pull_request'
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

      - name: Cache Playwright Chromium
        id: playwright-cache
        if: steps.scope.outputs.active == 'true' || github.event_name != 'pull_request'
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: pw-${{ runner.os }}-${{ hashFiles('package.json') }}

      - name: Install Playwright Chromium
        if: (steps.scope.outputs.active == 'true' || github.event_name != 'pull_request') && (steps.playwright-cache.outputs.cache-hit != 'true')
        run: npx playwright install chromium

      - name: Verify Playwright binary
        if: steps.scope.outputs.active == 'true' || github.event_name != 'pull_request'
        run: npx playwright --version

      - name: Build Chrome extension
        if: steps.scope.outputs.active == 'true' || github.event_name != 'pull_request'
        run: npm run build:chrome

      - name: Run 76-case regression suite
        if: steps.scope.outputs.active == 'true' || github.event_name != 'pull_request'
        # Full PR-branch regression (unpinned). No --grep filter, no
        # continue-on-error -- regression IS a blocking gate (Pitfall 8 #4).
        run: |
          npx playwright test \
            --config tests/e2e/playwright.config.js \
            specs/regression.spec.js

      - name: Comment on regression failure
        if: (steps.scope.outputs.active == 'true' || github.event_name != 'pull_request') && failure()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          gh pr edit "$PR_NUMBER" --add-label "human-review-required" 2>&1 || true
          gh pr comment "$PR_NUMBER" --body "Verifier-gate regression-suite FAIL -- 76-case Playwright suite regressed on PR branch. PR stays draft for human review."

  # ---------------------------------------------------------------------------
  # Job 4: ready-flip -- flip PR draft -> ready iff every prior gate passed
  #
  # BLOCKER-01 fix (audit-milestone integration check, 2026-06-02): this job
  # MUST also apply the `auto-fix:verified` label after the ready-flip succeeds.
  # The downstream v40-auto-promote.yml job-level filter (line 67) waits on
  # this label; without the producer step here, the entire PROMOTE-01..04
  # chain is dead code at the workflow level (the script-level triple-gate in
  # scripts/auto-fix-promote.mjs still enforces correctly, but the workflow
  # filter never matches). ARCHITECTURE.md:141 specified this producer; the
  # Phase 41 implementation missed it; TP-05 vitest test
  # (tests/unit/v4-touchpoints.test.js:147-176) was narrowly scoped to the
  # consumer-side string-pin and could not surface the gap; UAT-47-a (the
  # live end-to-end test that would have caught this on first run) was
  # correctly DEFERRED per CONTEXT.md `requires-push` semantics.
  # ---------------------------------------------------------------------------
  ready-flip:
    needs: [verifier-gate, regression-suite]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      PR_NUM: ${{ github.event.pull_request.number }}
      # Phase 53 PARTIAL-02 (D-09..D-13) — wire verifier-gate outputs for the
      # conditional partial-verified label step below.
      PASSING_CASES:  ${{ needs.verifier-gate.outputs.passing_cases }}
      FAILING_CASES:  ${{ needs.verifier-gate.outputs.failing_cases }}
      AFFECTED_COUNT: ${{ needs.verifier-gate.outputs.affected_count }}

    steps:
      - name: Scope decision (auto-fix/* PRs only; fast-path SUCCESS otherwise)
        id: scope
        if: github.event_name == 'pull_request'
        run: |
          if [[ "${{ github.head_ref }}" == auto-fix/* ]]; then
            echo "active=true" >> "$GITHUB_OUTPUT"
          else
            echo "active=false" >> "$GITHUB_OUTPUT"
            echo "Fast-path SUCCESS — non-auto-fix PR (head=${{ github.head_ref }})"
          fi

      - name: Flip draft -> ready (idempotent)
        if: steps.scope.outputs.active == 'true' || github.event_name != 'pull_request'
        # Pitfall D mitigation -- gh pr ready returns non-zero on already-ready
        # PRs and has no --force flag. The defensive isDraft check makes
        # workflow_dispatch re-runs safe.
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          IS_DRAFT=$(gh pr view "$PR_NUMBER" --json isDraft --jq '.isDraft')
          if [ "$IS_DRAFT" = "true" ]; then
            gh pr ready "$PR_NUMBER"
            gh pr comment "$PR_NUMBER" --body "Verifier-gate PASS -- all 3 affected-case runs Tier A/B + 76-case regression clean. Draft -> ready-for-review."
          else
            echo "PR #$PR_NUMBER already ready-for-review; skipping flip"
          fi

      - name: Ensure auto-fix:verified label exists
        if: steps.scope.outputs.active == 'true' || github.event_name != 'pull_request'
        # Idempotent label create (mirrors the human-review-required pattern at
        # diff-guard:95-104 and e2e-nightly.yml:97-102). --force updates the
        # label if it already exists; || true makes the step safe if gh rejects
        # --force. Color 0E8A16 is GitHub's green-tag default; matches the
        # auto-fix:verified semantic ("clean / promoted to ready").
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh label create auto-fix:verified \
            --color 0E8A16 \
            --description "Verifier-gate confirmed 3xTier A/B + 76-case regression pass" \
            --force 2>/dev/null || true

      - name: Apply auto-fix:verified label
        if: steps.scope.outputs.active == 'true' || github.event_name != 'pull_request'
        # BLOCKER-01 producer step — closes the missing seam to
        # v40-auto-promote.yml's `contains(...labels.*.name, 'auto-fix:verified')`
        # filter (line 67). Runs UNCONDITIONALLY after ready-flip (no `if:
        # failure()` guard) because reaching this step means both verifier-gate
        # and regression-suite passed (job-level `needs:` already gated us).
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: gh pr edit "$PR_NUMBER" --add-label "auto-fix:verified"

      - name: Conditional partial-verified label (>=4/5, FLAKE-aware)
        if: steps.scope.outputs.active == 'true' || github.event_name != 'pull_request'
        # Phase 53 PARTIAL-02 (D-09..D-13). Fires ONLY when verifier-gate
        # produced partial outputs AND all 4 conditions hold:
        #   1. affected_count >= 5             (D-12 — abstain for small sets)
        #   2. passing/affected >= 0.80        (D-11 — PARTIAL_THRESHOLD)
        #   3. passing < affected              (D-09 — NOT a full pass; full pass took the auto-fix:verified path above)
        #   4. no failing case has errorClass=='FLAKE' (D-13 — FLAKE masquerade mitigation)
        # The existing auto-fix:verified label step above is BYTE-UNCHANGED
        # (D-10). On full-pass branch, FAILING_CASES is empty and this step
        # exits 0 without action.
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          if [ -z "$PASSING_CASES" ] || [ -z "$FAILING_CASES" ]; then
            echo "Full-pass or full-fail (no partial outputs) — partial-label step abstains"
            exit 0
          fi
          PASS_COUNT=$(echo "$PASSING_CASES" | tr ',' '\n' | grep -c .)
          FAIL_COUNT=$(echo "$FAILING_CASES" | tr ',' '\n' | grep -c .)
          AFFECTED=$AFFECTED_COUNT
          if [ "$AFFECTED" -lt 5 ]; then
            echo "affected_count=$AFFECTED < 5 — abstaining per D-12"
            exit 0
          fi
          if [ "$PASS_COUNT" -ge "$AFFECTED" ]; then
            echo "full pass — handled by auto-fix:verified step above"
            exit 0
          fi
          # Threshold check via awk (no bc dependency required on ubuntu-latest)
          RATIO_OK=$(awk -v p="$PASS_COUNT" -v a="$AFFECTED" 'BEGIN { print (a > 0 && p / a >= 0.80) ? 1 : 0 }')
          if [ "$RATIO_OK" != "1" ]; then
            echo "ratio $PASS_COUNT/$AFFECTED < 0.80 — abstaining"
            exit 0
          fi
          # FLAKE-masquerade check (D-13): inspect per-case JSON outputs from
          # the verifier-gate uploaded artifact directory. The verifier-gate
          # job ran in a separate runner; we re-download via gh run download.
          mkdir -p /tmp/verifier-reports
          gh run download "$GITHUB_RUN_ID" \
            --name "verifier-gate-reports-$GITHUB_RUN_ID" \
            --dir /tmp/verifier-reports 2>/dev/null || true
          FLAKE_PRESENT=0
          for case_id in $(echo "$FAILING_CASES" | tr ',' ' '); do
            for report in /tmp/verifier-reports/single-case-${case_id}-run-*.json; do
              [ -f "$report" ] || continue
              if jq -e '.runs[]? | select(.errorClass == "FLAKE")' "$report" >/dev/null 2>&1; then
                FLAKE_PRESENT=1
                break 2
              fi
            done
          done
          if [ "$FLAKE_PRESENT" = "1" ]; then
            echo "FLAKE present in failing cases — abstaining per D-13 (1 flake cannot mask 4 real fails)"
            exit 0
          fi
          # All 4 conditions met — apply the partial-verified label.
          gh label create auto-fix:partial-verified \
            --color FBCA04 \
            --description "Verifier-gate passed >=4/5 of affected cases; failing cases stay quarantined" \
            --force 2>/dev/null || true
          gh pr edit "$PR_NUMBER" --add-label "auto-fix:partial-verified"
          # Phase 53 PARTIAL-03 (D-16) marker tail — cross-workflow data
          # handoff. v40-auto-promote.yml's parse step greps PR comments for
          # this HTML marker to recover the passing-cases CSV (the workflows
          # are separate runners, so job outputs cannot cross over). PURE
          # ADDITION to the comment body — does not alter the human-readable
          # status text above. Documented structural exception to PARTIAL-02
          # commit purity (committed in Phase 53 commit (c) per D-20).
          gh pr comment "$PR_NUMBER" --body "$(cat <<EOF
          Verifier-gate PARTIAL PASS — ${PASS_COUNT}/${AFFECTED} affected cases passed. Failing case(s): ${FAILING_CASES}. Promotion will mutate the corpus only for the passing subset on merge.

          <!-- partial_passing_cases: ${PASSING_CASES} -->
          EOF
          )"
