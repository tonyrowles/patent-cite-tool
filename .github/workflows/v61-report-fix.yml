# .github/workflows/v61-report-fix.yml
#
# Phase 14 (ADR-001) — NOTIFY-ONLY. The LLM fix generation that Phase 12 ran here
# via the Anthropic API has moved LOCAL, to the Claude Code subscription transport
# (`npm run fix-report -- <issue#>`, see scripts/fix-report-local.mjs + ADR-001).
# CI cannot run the subscription transport (invokeClaudePWithLedger refuses when
# CI/GITHUB_ACTIONS is set, and hosted runners can't reach the operator's Claude
# Code auth), so this workflow no longer fetches KV, calls an LLM, runs the
# regression loop, or opens a PR. It only acknowledges the promoted Issue and
# points the operator at the local command.
#
# What is UNCHANGED downstream:
#   - The resulting auto-fix/<fp> draft PR (created locally) is still gated by
#     v40-verifier-gate.yml via the branch prefix.
#   - GATE-04 human-merge invariant: no automated merging of any kind here.
#
# Security: untrusted Issue fields (label.name) are passed via env:, never
# interpolated into a run: script (prevents shell injection — CWE-94).

name: v6.1 Report Fix

on:
  issues:
    types: [labeled]

permissions:
  issues: write

concurrency:
  group: v61-report-fix-${{ github.event.issue.number }}
  cancel-in-progress: false

jobs:
  notify:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      GITHUB_REPOSITORY: ${{ github.repository }}
    steps:
      # Scope gate — only act on the report-fix-candidate label.
      - name: Scope gate (report-fix-candidate label only)
        id: scope
        env:
          LABEL_NAME: ${{ github.event.label.name }}
        run: |
          if [[ "$LABEL_NAME" == "report-fix-candidate" ]]; then
            echo "active=true" >> "$GITHUB_OUTPUT"
          else
            echo "active=false" >> "$GITHUB_OUTPUT"
            echo "Scope: label '$LABEL_NAME' is not report-fix-candidate — no-op."
          fi

      - name: Exit early if not in scope
        if: steps.scope.outputs.active != 'true'
        run: exit 0

      # Acknowledge the promoted report and point the operator at the local
      # subscription-transport command. No LLM, no KV, no PR creation in CI.
      - name: Comment — run report-fix locally (subscription transport)
        if: steps.scope.outputs.active == 'true'
        env:
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          BODY="🛠️ Promoted for auto-fix. Fix generation runs **locally** via the Claude Code subscription (no Anthropic API in CI — see ADR-001). On an authenticated operator machine, run: \`npm run fix-report -- $ISSUE_NUMBER --push\`. That creates an \`auto-fix/<fp>\` draft PR gated by \`v40-verifier-gate.yml\`; human merge is required (GATE-04)."
          gh issue comment "$ISSUE_NUMBER" --repo "$GITHUB_REPOSITORY" --body "$BODY" || true
