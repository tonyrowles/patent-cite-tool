<!DOCTYPE html>
<html>
<head>
  <style>
    body {
      width: 280px;
      padding: 12px 16px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 13px;
      color: #1a1a1a;
      margin: 0;
    }
    h1 {
      font-size: 14px;
      font-weight: 600;
      margin: 0 0 8px 0;
    }
    .status {
      padding: 8px 10px;
      border-radius: 6px;
      margin-top: 4px;
    }
    .status-ready { background: #ecfdf5; color: #065f46; }
    .status-fetching { background: #eff6ff; color: #1e40af; }
    .status-error { background: #fef2f2; color: #991b1b; }
    .status-unavailable { background: #fffbeb; color: #92400e; }
    .status-idle { background: #f3f4f6; color: #4b5563; }
    .patent-id { font-weight: 600; font-family: monospace; }
    .error-detail { font-size: 12px; margin-top: 4px; opacity: 0.8; }
    .parse-stats { font-size: 12px; margin-top: 4px; opacity: 0.8; }
  </style>
</head>
<body>
  <h1>Patent Citation Tool</h1>
  <div id="content"></div>

  <div style="margin-top: 12px; text-align: center;">
    <a id="settingsLink" href="#" style="font-size: 11px; color: #6b7280; text-decoration: underline; cursor: pointer;">Settings</a>
  </div>

  <script src="popup.js"></script>
</body>
</html>
